<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日幸运抽签</title>
    <meta
      name="description"
      content="互动式幸运抽签：点击抽签，观看动效，获得签号、签文和祝福语，并一键分享。"
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
      <span class="orb orb-d"></span>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">🎴</div>
        <div class="brand-text">
          <div class="brand-title">今日幸运抽签</div>
          <div class="brand-sub">好运正在路上</div>
        </div>
      </div>
      <a
        class="ghost-link"
        id="lastResultLink"
        href="./result.html"
        aria-label="查看上一次结果（若有）"
      >
        查看结果
      </a>
    </header>

    <main class="container">
      <section class="hero">
        <h1 class="hero-title">欢迎来到今日幸运抽签</h1>
        <p class="hero-desc">准备好测试你的运气了吗？点一下，让好运“转起来”。</p>

        <div class="stage" aria-label="抽签舞台">
          <div class="wheel-wrap" aria-hidden="true">
            <div class="wheel" id="wheel">
              <div class="wheel-glow"></div>
              <div class="wheel-slices">
                <span>🍊</span><span>💖</span><span>🌤️</span><span>💜</span><span>⭐</span><span>🎁</span>
                <span>🍀</span><span>✨</span><span>🧧</span><span>🎈</span><span>🌈</span><span>🎴</span>
              </div>
            </div>
            <div class="pointer" aria-hidden="true"></div>
          </div>

          <button id="drawBtn" class="draw-btn" type="button">
            <span class="draw-btn__shine" aria-hidden="true"></span>
            <span class="draw-btn__text">点击抽签</span>
            <span class="draw-btn__sub">Let’s roll</span>
          </button>

          <div class="status" id="status" role="status" aria-live="polite"></div>
        </div>

        <div class="hint-row">
          <span class="pill">🎯 动效抽签</span>
          <span class="pill">🌈 渐变配色</span>
          <span class="pill">📣 一键分享</span>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
